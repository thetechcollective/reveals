<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

		<title>GitHub App Presentation with Mermaid</title>

		<link rel="stylesheet" href="/dist/reset.css">
		<link rel="stylesheet" href="/dist/reveal.css">
		<link rel="stylesheet" href="/dist/theme/white.css">
		<link rel="stylesheet" href="/plugin/mermaid/mermaid.css">

		<!-- Mermaid.js library -->
		<script src="https://cdn.jsdelivr.net/npm/mermaid@11.9.0/dist/mermaid.min.js"></script>
	</head>
	<body>
		<div class="reveal">
			<div class="slides">
				<!-- Slides will be loaded from GitHub gist -->
			</div>
		</div>

		<script src="/dist/reveal.js"></script>
		<script src="/plugin/markdown/markdown.js"></script>
		<script src="/plugin/mermaid/mermaid.js"></script>
		<script src="/js/gistloader.js"></script>

		<script>
			Reveal.initialize({
				hash: true,
				plugins: [ RevealMarkdown, RevealMermaid ]
			});

			// Load presentation from gist
			// The gistloader will process the markdown and the Mermaid plugin will render the diagrams
		</script>
	</body>
</html>
